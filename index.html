<!DOCTYPE html>
<html>
<head>
<title>KnightonMths</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; text-align: center; background: white; }
.hidden { display:none; }

button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#4CAF50;
  color:white;
}

.card {
  background:#f5f5f5;
  padding:15px;
  margin:10px auto;
  width:300px;
  border-radius:10px;
}

.correct { background:lightgreen; }
.wrong { background:#ff9999; }
</style>
</head>

<body>

<h1>KnightonMths</h1>

<div id="home">
  <button onclick="show('login')">Login</button>
  <button onclick="show('signup')">Sign Up</button>
  <button onclick="guestLogin()">Guest</button>
</div>

<div id="signup" class="hidden">
  <input id="emailSignup" placeholder="School Email"><br>
  <input id="passSignup" type="password" placeholder="Password"><br>
  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
  </select><br>

  <button onclick="signup()">Create</button>
  <button onclick="googleLogin()">Google</button>
</div>

<div id="login" class="hidden">
  <input id="emailLogin" placeholder="School Email"><br>
  <input id="passLogin" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="googleLogin()">Google</button>
</div>

<div id="dashboard" class="hidden">
  <div class="card">
    <p id="stats"></p>
  </div>

  <div id="classUI"></div>

  <button onclick="startGame()">Play</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="game" class="hidden">
  <div id="timer"></div>
  <div id="questions"></div>

  <button onclick="submitGame()">Submit</button>
</div>

<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="loseSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBdUuLURlJJ-e-6a3PLn6cH4RxJ0Avlkho",
  authDomain: "maths-ca328.firebaseapp.com",
  projectId: "maths-ca328",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let questions = [];
let answers = [];
let startTime = 0;

// NAV
function show(id){
  ["home","signup","login","dashboard","game"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// SIGNUP
async function signup(){
  let email = emailSignup.value;
  let pass = passSignup.value;
  let role = document.getElementById("role").value;

  let res = await auth.createUserWithEmailAndPassword(email, pass);
  currentUser = res.user;

  let classCode = role === "teacher"
    ? Math.random().toString(36).substring(2,7).toUpperCase()
    : null;

  await db.collection("users").doc(currentUser.uid).set({
    email,
    role,
    level:1,
    bestTime:null,
    classCode
  });

  if(classCode) alert("CLASS CODE: "+classCode);

  loadDashboard();
}

// LOGIN
async function login(){
  let res = await auth.signInWithEmailAndPassword(emailLogin.value, passLogin.value);
  currentUser = res.user;
  loadDashboard();
}

// GOOGLE
async function googleLogin(){
  let provider = new firebase.auth.GoogleAuthProvider();
  let res = await auth.signInWithPopup(provider);

  currentUser = res.user;

  let doc = await db.collection("users").doc(currentUser.uid).get();

  if(!doc.exists){
    await db.collection("users").doc(currentUser.uid).set({
      email: currentUser.email,
      role:"student",
      level:1,
      bestTime:null,
      classCode:null
    });
  }

  loadDashboard();
}

// GUEST
async function guestLogin(){
  let res = await auth.signInAnonymously();
  currentUser = res.user;
  loadDashboard(true);
}

// DASHBOARD
async function loadDashboard(isGuest=false){
  show("dashboard");

  if(isGuest){
    stats.innerText = "Guest Mode";
    return;
  }

  let doc = await db.collection("users").doc(currentUser.uid).get();
  let data = doc.data();

  stats.innerText =
`Email: ${data.email}
Role: ${data.role}
Level: ${data.level}
Class: ${data.classCode || "None"}`;

  // CLASS UI
  if(data.role === "teacher"){
    classUI.innerHTML = `<p>Class Code: ${data.classCode}</p>`;
  } else {
    classUI.innerHTML = `
      <input id="joinCode" placeholder="Class Code">
      <button onclick="joinClass()">Join</button>
    `;
  }
}

// JOIN CLASS
async function joinClass(){
  let code = joinCode.value;

  await db.collection("users").doc(currentUser.uid).update({
    classCode: code
  });

  loadDashboard();
}

// GAME
async function startGame(){
  show("game");

  let doc = await db.collection("users").doc(currentUser.uid).get();
  let level = doc.data().level;

  questions = [];
  answers = [];

  for(let i=0;i<5+level;i++){
    let a = Math.floor(Math.random()*10)+1;
    let b = Math.floor(Math.random()*10)+1;

    let ans = a+b;

    questions.push(`${a}+${b}`);
    answers.push(ans);
  }

  questionsDiv.innerHTML = "";

  questions.forEach((q,i)=>{
    questionsDiv.innerHTML += `${q} = <input id="q${i}"><br>`;
  });

  startTime = Date.now();
}

// SUBMIT (ANTI CHEAT)
async function submitGame(){
  let time = (Date.now()-startTime)/1000;

  if(time < 2){
    alert("Cheating detected");
    return;
  }

  let correct = 0;

  answers.forEach((ans,i)=>{
    let val = parseInt(document.getElementById("q"+i).value);
    if(val === ans) correct++;
  });

  let win = correct / answers.length >= 0.8;

  if(win){
    winSound.play();
  } else {
    loseSound.play();
  }

  let ref = db.collection("users").doc(currentUser.uid);
  let doc = await ref.get();
  let data = doc.data();

  if(win) data.level++;

  if(!data.bestTime || time < data.bestTime){
    data.bestTime = time;
  }

  await ref.update(data);

  setTimeout(loadDashboard, 1000);
}

// LOGOUT
function logout(){
  auth.signOut();
  show("home");
}

show("home");

</script>

</body>
</html>
