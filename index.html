<!DOCTYPE html>
<html>
<head>
<title>KnightonMths</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:white; text-align:center; }
.hidden { display:none; }

.card {
  background:#f2f2f2;
  padding:15px;
  margin:10px auto;
  width:380px;
  border-radius:10px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
}

input, select { padding:8px; margin:5px; }
</style>
</head>

<body>

<h1>KnightonMths</h1>

<!-- HOME -->
<div id="home">
  <button onclick="show('login')">Login</button>
  <button onclick="show('signup')">Sign Up</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="hidden">
  <input id="emailSignup" placeholder="Email"><br>
  <input id="passSignup" type="password"><br>

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
  </select><br>

  <button onclick="signup()">Create</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <input id="emailLogin" placeholder="Email"><br>
  <input id="passLogin" type="password"><br>

  <button onclick="login()">Login</button>
</div>

<!-- MODE SELECT -->
<div id="modeSelect" class="hidden">
  <h3>Choose Mode</h3>
  <button onclick="setMode('home')">Home</button>
  <button onclick="setMode('school')">School</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="card">
    <p id="stats"></p>
  </div>

  <!-- HOME SETTINGS -->
  <div id="homePanel" class="card hidden">
    <h3>Home Practice</h3>

    <select id="year">
      <option value="0">Year 0</option>
      <option value="1">Year 1</option>
      <option value="2">Year 2</option>
      <option value="3">Year 3</option>
      <option value="4">Year 4</option>
      <option value="5">Year 5</option>
      <option value="6">Year 6</option>
    </select>

    <h4>Question Types</h4>

    <label><input type="checkbox" id="add"> Add</label>
    <label><input type="checkbox" id="sub"> Sub</label>
    <label><input type="checkbox" id="mul"> Mul</label>
    <label><input type="checkbox" id="div"> Div</label>

    <br><br>
    <button onclick="startHome()">Start Practice</button>
  </div>

  <!-- TEACHER PANEL -->
  <div id="teacherPanel" class="card hidden"></div>

  <!-- STUDENT PANEL -->
  <div id="studentPanel" class="card hidden"></div>

  <button onclick="logout()">Logout</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="questions"></div>
  <button onclick="submitGame()">Submit</button>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBdUuLURlJJ-e-6a3PLn6cH4RxJ0Avlkho",
  authDomain: "maths-ca328.firebaseapp.com",
  projectId: "maths-ca328",
  appId: "1:58975960965:web:f82598477fa8ae3ee24eec"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;
let answers = [];
let mode = "home";
let activeAssignment = null;

// NAV
function show(id){
  ["home","signup","login","modeSelect","dashboard","game"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// SIGNUP
async function signup(){
  let res = await auth.createUserWithEmailAndPassword(emailSignup.value, passSignup.value);
  currentUser = res.user;

  await db.collection("users").doc(currentUser.uid).set({
    email: currentUser.email,
    role: role.value,
    classCode: role.value === "teacher"
      ? Math.random().toString(36).substring(2,7).toUpperCase()
      : null
  });

  show("modeSelect");
}

// LOGIN
async function login(){
  let res = await auth.signInWithEmailAndPassword(emailLogin.value, passLogin.value);
  currentUser = res.user;

  show("modeSelect");
}

// MODE
function setMode(m){
  mode = m;
  loadDashboard();
}

// DASHBOARD
async function loadDashboard(){
  show("dashboard");

  let doc = await db.collection("users").doc(currentUser.uid).get();
  let data = doc.data();

  stats.innerText = `${data.email} (${data.role})`;

  if(mode === "home"){
    homePanel.classList.remove("hidden");
  }

  if(mode === "school"){
    if(data.role === "teacher"){
      loadTeacher(data);
    } else {
      loadStudent(data);
    }
  }
}

// 🏠 HOME MODE
function startHome(){
  show("game");

  answers = [];
  questions.innerHTML = "";

  let year = parseInt(document.getElementById("year").value);
  let max = (year+1)*10;

  let types = [];
  if(add.checked) types.push("add");
  if(sub.checked) types.push("sub");
  if(mul.checked) types.push("mul");
  if(div.checked) types.push("div");

  if(types.length === 0) types = ["add"];

  for(let i=0;i<6;i++){

    let t = types[Math.floor(Math.random()*types.length)];
    let a = Math.floor(Math.random()*max)+1;
    let b = Math.floor(Math.random()*max)+1;

    let q, ans;

    if(t==="add"){ q=`${a}+${b}`; ans=a+b; }
    if(t==="sub"){ q=`${a}-${b}`; ans=a-b; }
    if(t==="mul"){ q=`${a}×${b}`; ans=a*b; }
    if(t==="div"){ q=`${a*b}/${b}`; ans=a; }

    answers.push(ans);
    questions.innerHTML += `${q} = <input id="q${i}"><br>`;
  }
}

// 👨‍🏫 TEACHER
async function loadTeacher(data){

  teacherPanel.classList.remove("hidden");

  teacherPanel.innerHTML = `
    <h3>Teacher Panel</h3>

    <select id="assignYear">
      <option value="0">Year 0</option>
      <option value="1">Year 1</option>
      <option value="2">Year 2</option>
      <option value="3">Year 3</option>
      <option value="4">Year 4</option>
      <option value="5">Year 5</option>
      <option value="6">Year 6</option>
    </select>

    <input id="title" placeholder="Assignment Title"><br>

    <button onclick="createAssignment('${data.classCode}')">Create Assignment</button>
  `;
}

// CREATE ASSIGNMENT (NOW FIXED WITH QUESTIONS)
async function createAssignment(classCode){

  await db.collection("assignments").add({
    title: title.value,
    classCode,
    year: parseInt(assignYear.value),
    createdAt: Date.now()
  });

  loadDashboard();
}

// 👨‍🎓 STUDENT
async function loadStudent(data){

  studentPanel.classList.remove("hidden");

  let snap = await db.collection("assignments")
    .where("classCode","==",data.classCode)
    .get();

  studentPanel.innerHTML = "<h3>Assignments</h3>";

  snap.forEach(doc=>{
    studentPanel.innerHTML += `
      <div class="card">
        ${doc.data().title}
        <button onclick="startAssignment('${doc.id}')">Start</button>
      </div>
    `;
  });
}

// START ASSIGNMENT (FIXED NOW ACTUALLY WORKS)
async function startAssignment(id){

  activeAssignment = id;
  show("game");

  answers = [];
  questions.innerHTML = "";

  let doc = await db.collection("assignments").doc(id).get();
  let data = doc.data();

  let max = (data.year+1)*10;

  for(let i=0;i<6;i++){
    let a = Math.floor(Math.random()*max)+1;
    let b = Math.floor(Math.random()*max)+1;

    answers.push(a+b);
    questions.innerHTML += `${a}+${b} = <input id="q${i}"><br>`;
  }
}

// SUBMIT
async function submitGame(){

  let correct = 0;

  answers.forEach((ans,i)=>{
    let val = parseInt(document.getElementById("q"+i).value);
    if(val === ans) correct++;
  });

  await db.collection("results").add({
    user: currentUser.uid,
    assignment: activeAssignment,
    score: correct
  });

  loadDashboard();
}

// LOGOUT
function logout(){
  auth.signOut();
  show("home");
}

show("home");

</script>

</body>
</html>
