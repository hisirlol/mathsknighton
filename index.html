<!DOCTYPE html>
<html>
<head>
<title>KnightonMths</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; text-align: center; background: white; }
.hidden { display:none; }

button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

.card {
  background:#f5f5f5;
  padding:15px;
  margin:10px auto;
  width:340px;
  border-radius:10px;
}

.correct { background:lightgreen; }
.wrong { background:#ff9999; }
</style>
</head>

<body>

<h1>KnightonMths</h1>

<div id="home">
  <button onclick="show('login')">Login</button>
  <button onclick="show('signup')">Sign Up</button>
  <button onclick="guestLogin()">Guest</button>
</div>

<div id="signup" class="hidden">
  <input id="emailSignup" placeholder="Email"><br>
  <input id="passSignup" type="password" placeholder="Password"><br>

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
  </select><br>

  <button onclick="signup()">Create</button>
</div>

<div id="login" class="hidden">
  <input id="emailLogin" placeholder="Email"><br>
  <input id="passLogin" type="password"><br>

  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">

  <div class="card">
    <p id="stats"></p>
  </div>

  <div class="card">
    <h3>Select Year Level</h3>
    <select id="year">
      <option value="0">Year 0</option>
      <option value="1">Year 1</option>
      <option value="2">Year 2</option>
      <option value="3">Year 3</option>
      <option value="4">Year 4</option>
      <option value="5">Year 5</option>
      <option value="6">Year 6</option>
    </select>
  </div>

  <button onclick="startGame()">Play</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="game" class="hidden">
  <div id="questions"></div>
  <button onclick="submitGame()">Submit</button>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBdUuLURlJJ-e-6a3PLn6cH4RxJ0Avlkho",
  authDomain: "maths-ca328.firebaseapp.com",
  projectId: "maths-ca328",
  appId: "1:58975960965:web:f82598477fa8ae3ee24eec"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;
let answers = [];
let startTime = 0;

// NAV
function show(id){
  ["home","signup","login","dashboard","game"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// SIGNUP
async function signup(){
  let res = await auth.createUserWithEmailAndPassword(emailSignup.value, passSignup.value);
  currentUser = res.user;

  await db.collection("users").doc(currentUser.uid).set({
    email: currentUser.email,
    role: role.value,
    level: 1
  });

  loadDashboard();
}

// LOGIN
async function login(){
  let res = await auth.signInWithEmailAndPassword(emailLogin.value, passLogin.value);
  currentUser = res.user;
  loadDashboard();
}

// DASHBOARD
async function loadDashboard(){
  show("dashboard");

  let doc = await db.collection("users").doc(currentUser.uid).get();
  let data = doc.data();

  stats.innerText =
`Email: ${data.email}
Level: ${data.level}`;
}

// YEAR DIFFICULTY SYSTEM (NZ-STYLE)
function getConfig(year){
  if(year == 0) return {max:10, ops:["add"]};
  if(year == 1) return {max:10, ops:["add","sub"]};
  if(year == 2) return {max:12, ops:["add","sub","mul"]};
  if(year == 3) return {max:15, ops:["mul","div"]};
  if(year == 4) return {max:20, ops:["dec","add","sub"]};
  if(year == 5) return {max:50, ops:["pct","mul","div"]};
  return {max:100, ops:["add","sub","mul","div","pct","dec"]};
}

// GAME
async function startGame(){
  show("game");

  answers = [];
  questions.innerHTML = "";

  let year = document.getElementById("year").value;
  let cfg = getConfig(year);

  for(let i=0;i<6;i++){
    let op = cfg.ops[Math.floor(Math.random()*cfg.ops.length)];
    let a = Math.floor(Math.random()*cfg.max)+1;
    let b = Math.floor(Math.random()*cfg.max)+1;

    let q, ans;

    if(op=="add"){ q=`${a}+${b}`; ans=a+b; }
    if(op=="sub"){ q=`${a}-${b}`; ans=a-b; }
    if(op=="mul"){ q=`${a}×${b}`; ans=a*b; }
    if(op=="div"){ q=`${a*b}/${b}`; ans=a; }
    if(op=="dec"){ q=`${(a/2)} + ${(b/2)}`; ans=(a/2)+(b/2); }
    if(op=="pct"){ q=`${a*10}% of ${b}`; ans=(a/100)*b*10; }

    answers.push(ans);
    questions.innerHTML += `${q} = <input id="q${i}" autocomplete="off"><br>`;
  }

  startTime = Date.now();
}

// SUBMIT
async function submitGame(){
  let correct = 0;

  answers.forEach((ans,i)=>{
    let val = parseFloat(document.getElementById("q"+i).value);
    if(val === ans) correct++;
  });

  let win = correct >= 5;

  let ref = db.collection("users").doc(currentUser.uid);
  let doc = await ref.get();
  let data = doc.data();

  if(win) data.level++;

  await ref.update({ level:data.level });

  loadDashboard();
}

// LOGOUT
function logout(){
  auth.signOut();
  show("home");
}

show("home");

</script>

</body>
</html>
