<!DOCTYPE html>
<html>
<head>
  <title>Math Game</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; text-align: center; background: #eef; }
    .hidden { display: none; }
    button { padding: 10px; margin: 5px; }
    input, select { padding: 8px; margin: 5px; }

    #barContainer { width: 200px; background: #ccc; margin: 10px auto; }
    #bar { height: 20px; width: 0%; background: green; }

    .correct { background: lightgreen; }
    .wrong { background: #ff9999; }

    .card {
      background: white;
      margin: 5px auto;
      padding: 10px;
      width: 280px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Math Game</h1>

<!-- HOME -->
<div id="home">
  <button onclick="show('login')">Login</button>
  <button onclick="show('signup')">Make Account</button>
  <button onclick="startGame(true)">Guest</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="hidden">
  <h2>Create Account</h2>

  <input id="newUser" placeholder="Username"><br>
  <input id="newPass" type="password" placeholder="Password"><br>

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
    <option value="normal">Normal</option>
  </select><br>

  <button onclick="createAccount()">Create</button>
  <button onclick="show('home')">Back</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <h2>Login</h2>

  <input id="loginUser" placeholder="Username"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

  <!-- 🔥 GOOGLE LOGIN -->
  <button onclick="googleLogin()">Login with Google</button>

  <button onclick="show('home')">Back</button>
</div>

<!-- JOIN CLASS -->
<div id="joinClassUI" class="hidden">
  <h2>Join Class</h2>
  <input id="classInput" placeholder="Class Code">
  <button onclick="joinClass()">Join</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <h2>Dashboard</h2>

  <p id="stats"></p>

  <div id="barContainer">
    <div id="bar"></div>
  </div>

  <div id="classView"></div>

  <button onclick="startGame(false)">Start Game</button>
  <button onclick="resetGame()">Reset</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="timer">Time: 0</div>
  <div id="questions"></div>

  <button onclick="mark()">Mark</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script>

// ---------------- FIREBASE ----------------
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ---------------- STATE ----------------
let currentUser = null;
let questions = [];
let startTime = 0;
let timerInterval = null;
let difficulty = 1;

// ---------------- NAV ----------------
function show(id) {
  const screens = ["home","signup","login","dashboard","game","joinClassUI"];
  screens.forEach(s => document.getElementById(s).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// ---------------- GOOGLE LOGIN ----------------
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result => {
      const user = result.user;
      currentUser = user.displayName || user.email;

      if (!localStorage.getItem(currentUser)) {
        localStorage.setItem(currentUser, JSON.stringify({
          password: "",
          role: "student",
          level: 1,
          bestTime: null,
          classCode: null
        }));
      }

      show("dashboard");
      showDashboard();
    })
    .catch(err => alert("Google login failed: " + err.message));
}

// ---------------- EMAIL LOGIN ----------------
function login() {
  let user = loginUser.value;
  let pass = loginPass.value;

  let data = JSON.parse(localStorage.getItem(user));

  if (!data || data.password !== pass) {
    alert("Wrong login");
    return;
  }

  currentUser = user;
  show("dashboard");
  showDashboard();
}

// ---------------- SIGNUP ----------------
function createAccount() {
  let user = newUser.value;
  let pass = newPass.value;
  let role = document.getElementById("role").value;

  if (!user || !pass) return alert("Fill everything");
  if (localStorage.getItem(user)) return alert("User exists");

  let classCode = role === "teacher"
    ? Math.random().toString(36).substring(2, 8).toUpperCase()
    : null;

  if (role === "teacher") alert("CLASS CODE: " + classCode);

  localStorage.setItem(user, JSON.stringify({
    password: pass,
    role: role,
    level: 1,
    bestTime: null,
    classCode: classCode
  }));

  show("login");
}

// ---------------- DASHBOARD ----------------
function showDashboard() {
  let data = JSON.parse(localStorage.getItem(currentUser));

  document.getElementById("stats").innerText =
`User: ${currentUser}
Role: ${data.role}
Level: ${data.level}
Class: ${data.classCode || "None"}`;

  document.getElementById("bar").style.width =
    Math.min(data.level * 10, 100) + "%";

  if (data.role === "student" && !data.classCode) {
    show("joinClassUI");
    return;
  }
}

// ---------------- JOIN CLASS ----------------
function joinClass() {
  let code = document.getElementById("classInput").value;

  let data = JSON.parse(localStorage.getItem(currentUser));
  data.classCode = code;

  localStorage.setItem(currentUser, JSON.stringify(data));

  show("dashboard");
  showDashboard();
}

// ---------------- GAME ----------------
function startGame(guest) {
  show("game");

  if (timerInterval) clearInterval(timerInterval);

  questions = [];

  if (!guest && currentUser) {
    difficulty = JSON.parse(localStorage.getItem(currentUser)).level;
  } else {
    difficulty = 1;
  }

  generateQuestions();
  startTimer();
}

// ---------------- QUESTIONS ----------------
function generateQuestions() {
  let qDiv = document.getElementById("questions");
  qDiv.innerHTML = "";
  questions = [];

  let count = 5 + difficulty;

  for (let i = 0; i < count; i++) {
    let a = Math.floor(Math.random() * (10 * difficulty)) + 1;
    let b = Math.floor(Math.random() * (10 * difficulty)) + 1;

    let ops = ["+", "-", "*"];
    let op = ops[Math.floor(Math.random() * ops.length)];

    let ans =
      op === "+" ? a + b :
      op === "-" ? a - b :
      a * b;

    questions.push(ans);

    qDiv.innerHTML += `<p>${a} ${op} ${b} = <input id="q${i}"></p>`;
  }
}

// ---------------- TIMER (FIXED) ----------------
function startTimer() {
  startTime = Date.now();

  timerInterval = setInterval(() => {
    let time = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timer").innerText = "Time: " + time;
  }, 1000);
}

// ---------------- MARK (STOPS TIMER FIXED) ----------------
function mark() {
  clearInterval(timerInterval);

  let correct = 0;

  for (let i = 0; i < questions.length; i++) {
    let input = document.getElementById("q" + i);

    if (parseInt(input.value) === questions[i]) {
      input.classList.add("correct");
      correct++;
    } else {
      input.classList.add("wrong");
    }
  }

  let time = Math.floor((Date.now() - startTime) / 1000);

  let data = JSON.parse(localStorage.getItem(currentUser));

  if (correct / questions.length >= 0.8) {
    data.level++;
  }

  if (!data.bestTime || time < data.bestTime) {
    data.bestTime = time;
  }

  localStorage.setItem(currentUser, JSON.stringify(data));

  setTimeout(() => {
    show("dashboard");
    showDashboard();
  }, 800);
}

// ---------------- RESET ----------------
function resetGame() {
  clearInterval(timerInterval);
  questions = [];
  document.getElementById("questions").innerHTML = "";
  document.getElementById("timer").innerText = "Time: 0";
  show("dashboard");
}

// ---------------- LOGOUT ----------------
function logout() {
  currentUser = null;
  show("home");
}

show("home");

</script>

</body>
</html>
