<!DOCTYPE html>
<html>
<head>
<title>KnightonMths</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:white; text-align:center; }

.hidden { display:none; }

.card {
  background:#f2f2f2;
  padding:15px;
  margin:10px auto;
  width:380px;
  border-radius:10px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

input, select { padding:8px; margin:5px; }

.correct { background:lightgreen; }
.wrong { background:#ffaaaa; }
</style>
</head>

<body>

<h1>KnightonMths</h1>

<!-- HOME -->
<div id="home">
  <button onclick="show('login')">Login</button>
  <button onclick="show('signup')">Sign Up</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="hidden">
  <input id="emailSignup" placeholder="Email"><br>
  <input id="passSignup" type="password"><br>

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
  </select><br>

  <button onclick="signup()">Create</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <input id="emailLogin" placeholder="Email"><br>
  <input id="passLogin" type="password"><br>

  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="card">
    <p id="stats"></p>
  </div>

  <!-- JOIN CLASS -->
  <div id="joinClassBox" class="card hidden">
    <h3>Join Class</h3>
    <input id="classCodeInput" placeholder="Class Code">
    <button onclick="joinClass()">Join</button>
  </div>

  <!-- TEACHER PANEL -->
  <div id="teacherPanel" class="card hidden"></div>

  <!-- STUDENT PANEL -->
  <div id="studentPanel" class="card hidden"></div>

  <button onclick="startHome()">Home Practice</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="questions"></div>
  <button onclick="submitGame()">Submit</button>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBdUuLURlJJ-e-6a3PLn6cH4RxJ0Avlkho",
  authDomain: "maths-ca328.firebaseapp.com",
  projectId: "maths-ca328",
  appId: "1:58975960965:web:f82598477fa8ae3ee24eec"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;
let answers = [];
let currentClass = null;
let isTeacher = false;

// NAV
function show(id){
  ["home","signup","login","dashboard","game"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// SIGNUP
async function signup(){
  let res = await auth.createUserWithEmailAndPassword(emailSignup.value, passSignup.value);
  currentUser = res.user;

  isTeacher = role.value === "teacher";

  let classCode = isTeacher
    ? Math.random().toString(36).substring(2,7).toUpperCase()
    : null;

  await db.collection("users").doc(currentUser.uid).set({
    email: currentUser.email,
    role: role.value,
    classCode,
    xp:0,
    level:1
  });

  if(classCode) alert("CLASS CODE: " + classCode);

  loadDashboard();
}

// LOGIN
async function login(){
  let res = await auth.signInWithEmailAndPassword(emailLogin.value, passLogin.value);
  currentUser = res.user;

  loadDashboard();
}

// DASHBOARD
async function loadDashboard(){
  show("dashboard");

  let doc = await db.collection("users").doc(currentUser.uid).get();
  let data = doc.data();

  isTeacher = data.role === "teacher";
  currentClass = data.classCode;

  stats.innerText =
`${data.email}
Role: ${data.role}
XP: ${data.xp}
Level: ${data.level}`;

  // TEACHER
  if(isTeacher){
    teacherPanel.classList.remove("hidden");
    joinClassBox.classList.add("hidden");

    teacherPanel.innerHTML = `
      <h3>Teacher Class Panel</h3>
      <p>Class Code: <b>${data.classCode}</b></p>

      <input id="assignTitle" placeholder="Assignment Title"><br>
      <button onclick="createAssignment()">Create Assignment</button>

      <h4>Assignments</h4>
      <div id="assignmentList"></div>
    `;

    loadAssignments();
  }

  // STUDENT
  else {
    studentPanel.classList.remove("hidden");
    joinClassBox.classList.remove("hidden");

    loadStudentAssignments();
  }
}

// JOIN CLASS
async function joinClass(){
  await db.collection("users").doc(currentUser.uid).update({
    classCode: classCodeInput.value
  });

  loadDashboard();
}

// CREATE ASSIGNMENT
async function createAssignment(){
  await db.collection("assignments").add({
    title: assignTitle.value,
    classCode: currentClass,
    createdAt: Date.now()
  });

  loadAssignments();
}

// TEACHER LOAD
async function loadAssignments(){
  let snap = await db.collection("assignments")
    .where("classCode","==",currentClass).get();

  assignmentList.innerHTML = "";

  snap.forEach(doc=>{
    assignmentList.innerHTML += `<p>${doc.data().title}</p>`;
  });
}

// STUDENT LOAD
async function loadStudentAssignments(){
  let doc = await db.collection("users").doc(currentUser.uid).get();
  let data = doc.data();

  let snap = await db.collection("assignments")
    .where("classCode","==",data.classCode).get();

  studentPanel.innerHTML = "<h3>Assignments</h3>";

  snap.forEach(doc=>{
    studentPanel.innerHTML += `
      <div class="card">
        ${doc.data().title}
      </div>
    `;
  });
}

// HOME MODE
function startHome(){
  show("game");

  answers = [];
  questions.innerHTML = "";

  let max = 10;

  for(let i=0;i<6;i++){
    let a = Math.floor(Math.random()*max)+1;
    let b = Math.floor(Math.random()*max)+1;

    answers.push(a+b);
    questions.innerHTML += `${a}+${b} = <input id="q${i}"><br>`;
  }
}

// SUBMIT GAME
async function submitGame(){
  let correct = 0;

  answers.forEach((ans,i)=>{
    let val = parseInt(document.getElementById("q"+i).value);
    if(val === ans) correct++;
  });

  let xpGain = correct * 10;

  let ref = db.collection("users").doc(currentUser.uid);
  let doc = await ref.get();
  let data = doc.data();

  data.xp += xpGain;

  if(data.xp > 100){
    data.level++;
    data.xp = 0;
  }

  await ref.update(data);

  loadDashboard();
}

// LOGOUT
function logout(){
  auth.signOut();
  show("home");
}

show("home");

</script>

</body>
</html>
