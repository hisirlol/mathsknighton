<!DOCTYPE html>
<html>
<head>
<title>Knighton Maths</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  text-align:center;
  background: linear-gradient(white,#eef7ff);
}

.card {
  background:white;
  padding:15px;
  margin:10px auto;
  width:420px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.hidden { display:none; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
}

.side {
  position:fixed;
  right:10px;
  top:10px;
  background:#4CAF50;
  color:white;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>Knighton Maths</h1>

<div id="sideCode" class="side hidden"></div>

<!-- LOGIN -->
<div id="home">
  <button onclick="show('login')">Login</button>
  <button onclick="show('signup')">Sign Up</button>
</div>

<div id="signup" class="hidden">
  <input id="emailSignup" placeholder="Email"><br>
  <input id="passSignup" type="password"><br>

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
  </select><br>

  <button onclick="signup()">Create</button>
</div>

<div id="login" class="hidden">
  <input id="emailLogin" placeholder="Email"><br>
  <input id="passLogin" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card">
  <p id="stats"></p>
</div>

<!-- JOIN -->
<div id="joinBox" class="card hidden">
  <input id="joinCode" placeholder="Enter Class Code">
  <button onclick="joinClass()">Join Class</button>
</div>

<!-- HOME -->
<div class="card">
  <h3>Home Practice</h3>

  <select id="year">
    <option value="0">Year 0</option>
    <option value="1">Year 1</option>
    <option value="2">Year 2</option>
    <option value="3">Year 3</option>
    <option value="4">Year 4</option>
    <option value="5">Year 5</option>
    <option value="6">Year 6</option>
  </select>

  <select id="topic">
    <option value="add">Addition</option>
    <option value="sub">Subtraction</option>
    <option value="mul">Multiplication</option>
    <option value="div">Division</option>
  </select>

  <input id="qCount" type="number" value="6" min="1" max="20">

  <button onclick="startHome()">Start</button>
</div>

<!-- ASSIGNMENTS -->
<div id="assignments" class="card hidden"></div>

<!-- TEACHER -->
<div id="teacherPanel" class="card hidden"></div>

<!-- LIVE RESULTS -->
<div id="liveResults" class="card hidden"></div>

<button onclick="logout()">Logout</button>

</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="questions"></div>
  <button onclick="submitGame()">Submit</button>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "maths-ca328.firebaseapp.com",
  projectId: "maths-ca328",
  appId: "1:58975960965:web:f82598477fa8ae3ee24eec"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;
let answers = [];
let activeAssignment = null;

// NAV
function show(id){
  ["home","signup","login","dashboard","game"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// SIGNUP
async function signup(){
  let res = await auth.createUserWithEmailAndPassword(emailSignup.value, passSignup.value);
  currentUser = res.user;

  let classCode = role.value==="teacher"
    ? Math.random().toString(36).substring(2,7).toUpperCase()
    : null;

  await db.collection("users").doc(currentUser.uid).set({
    email: currentUser.email,
    role: role.value,
    classCode,
    xp:0,
    level:1
  });

  loadDashboard();
}

// LOGIN
async function login(){
  let res = await auth.signInWithEmailAndPassword(emailLogin.value, passLogin.value);
  currentUser = res.user;
  loadDashboard();
}

// DASHBOARD
async function loadDashboard(){
  show("dashboard");

  let doc = await db.collection("users").doc(currentUser.uid).get();
  let data = doc.data();

  stats.innerText = `${data.email}
XP: ${data.xp} | Level: ${data.level}`;

  if(data.classCode){
    sideCode.innerText = "Class Code: " + data.classCode;
    sideCode.classList.remove("hidden");
  }

  if(data.role==="teacher"){
    loadTeacher(data);
    listenResults(data.classCode);
  } else {
    joinBox.classList.remove("hidden");
    loadAssignments(data);
  }
}

// JOIN
async function joinClass(){
  await db.collection("users").doc(currentUser.uid).update({
    classCode: joinCode.value
  });
  loadDashboard();
}

// HOME
function startHome(){
  show("game");

  answers = [];
  questions.innerHTML = "";

  let count = parseInt(qCount.value);
  let max = getMax(year.value);

  for(let i=0;i<count;i++){
    gen(topic.value, max, i);
  }
}

// GENERATOR
function getMax(y){
  if(y<=1) return 10;
  if(y<=3) return 20;
  if(y<=4) return 50;
  return 100;
}

function gen(t,max,i){
  let a=Math.floor(Math.random()*max)+1;
  let b=Math.floor(Math.random()*max)+1;

  let q,ans;

  if(t==="add"){q=`${a}+${b}`;ans=a+b;}
  if(t==="sub"){if(a<b){[a,b]=[b,a];} q=`${a}-${b}`;ans=a-b;}
  if(t==="mul"){a=Math.ceil(Math.random()*12);b=Math.ceil(Math.random()*12); q=`${a}×${b}`;ans=a*b;}
  if(t==="div"){let r=Math.ceil(Math.random()*12);let d=Math.ceil(Math.random()*12);let n=r*d; q=`${n}÷${d}`;ans=r;}

  answers.push(ans);
  questions.innerHTML+=`${q}=<input id="q${i}"><br>`;
}

// TEACHER
function loadTeacher(data){
  teacherPanel.classList.remove("hidden");

  teacherPanel.innerHTML = `
  <h3>Teacher Panel</h3>

  <input id="title" placeholder="Title"><br>

  <select id="mode">
    <option value="auto">Auto</option>
    <option value="manual">Manual</option>
  </select>

  <div id="autoBox">
    <select id="assignYear">
      <option value="0">Year 0</option>
      <option value="6">Year 6</option>
    </select>

    <select id="assignTopic">
      <option value="add">Addition</option>
      <option value="sub">Subtraction</option>
      <option value="mul">Multiplication</option>
      <option value="div">Division</option>
    </select>
  </div>

  <div id="manualBox" style="display:none;">
    <textarea id="manualQs" rows="5"></textarea>
  </div>

  <button onclick="createAssignment('${data.classCode}')">Create</button>
  `;

  mode.onchange = ()=>{
    autoBox.style.display = mode.value==="auto"?"block":"none";
    manualBox.style.display = mode.value==="manual"?"block":"none";
  };
}

// CREATE
async function createAssignment(code){

  let data = {
    title:title.value,
    classCode:code,
    mode:mode.value
  };

  if(mode.value==="auto"){
    data.year=parseInt(assignYear.value);
    data.topic=assignTopic.value;
  } else {
    data.questions=manualQs.value.split("\n");
  }

  await db.collection("assignments").add(data);
}

// STUDENT ASSIGNMENTS
async function loadAssignments(data){
  assignments.classList.remove("hidden");

  let snap = await db.collection("assignments")
    .where("classCode","==",data.classCode).get();

  assignments.innerHTML="<h3>Assignments</h3>";

  snap.forEach(doc=>{
    let a=doc.data();

    assignments.innerHTML+=`
      <div class="card">
        ${a.title}
        <button onclick="startAssignment('${doc.id}')">Start</button>
      </div>
    `;
  });
}

// START ASSIGNMENT
async function startAssignment(id){
  activeAssignment=id;
  show("game");

  let doc = await db.collection("assignments").doc(id).get();
  let data = doc.data();

  answers=[];
  questions.innerHTML="";

  if(data.mode==="manual"){
    data.questions.forEach((q,i)=>{
      let ans=eval(q.replace("×","*").replace("÷","/"));
      answers.push(ans);
      questions.innerHTML+=`${q}=<input id="q${i}"><br>`;
    });
    return;
  }

  let max=getMax(data.year);

  for(let i=0;i<6;i++){
    gen(data.topic,max,i);
  }
}

// SUBMIT + XP
async function submitGame(){

  let correct=0;

  answers.forEach((a,i)=>{
    if(parseFloat(document.getElementById("q"+i).value)===a) correct++;
  });

  let ref = db.collection("users").doc(currentUser.uid);
  let doc = await ref.get();
  let data = doc.data();

  data.xp += correct*10;

  if(data.xp>=100){
    data.level++;
    data.xp=0;
  }

  await ref.update(data);

  await db.collection("results").add({
    user: currentUser.uid,
    assignment: activeAssignment,
    score: correct
  });

  loadDashboard();
}

// LIVE RESULTS
function listenResults(code){
  liveResults.classList.remove("hidden");

  db.collection("assignments")
    .where("classCode","==",code)
    .onSnapshot(async snap=>{

      liveResults.innerHTML="<h3>Live Results</h3>";

      let resSnap = await db.collection("results").get();

      resSnap.forEach(r=>{
        liveResults.innerHTML+=`Score: ${r.data().score}<br>`;
      });

    });
}

// LOGOUT
function logout(){
  auth.signOut();
  show("home");
}

show("home");

</script>

</body>
</html>
